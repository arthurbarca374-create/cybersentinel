<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — CyberSentinel</title>
  <link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body class="auth-page">
  <div class="auth-container">
    <a href="/" class="auth-logo">🛡️ CyberSentinel</a>
    <div class="auth-card">
      <h2>Start your free trial</h2>
      <p class="auth-sub">14 days free · 10 scans · No credit card</p>

      <a href="/api/auth/github" class="btn btn-github btn-block">
        <svg height="18" viewBox="0 0 16 16" width="18" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
          -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
          .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
          -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
          .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
          .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
          0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        Sign up with GitHub
      </a>

      <div class="divider"><span>or</span></div>

      <form id="register-form">
        <div id="register-error" class="alert alert-error hidden"></div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="cool-hacker" required minlength="3"/>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="min 8 characters" required minlength="8"/>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Free Account</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </p>
    </div>
  </div>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
