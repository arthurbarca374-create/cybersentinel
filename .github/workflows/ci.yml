name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cybersentinel

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt flake8 mypy bandit
      - run: flake8 backend/ main.py --max-line-length=120 --exclude=__pycache__
      - run: mypy backend/ --ignore-missing-imports || true
      - run: bandit -r backend/ -x tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt pytest pytest-asyncio httpx coverage
      - name: Run tests with coverage
        env:
          SECRET_KEY: test-secret-key-for-ci
          GITHUB_CLIENT_ID: dummy
          GITHUB_CLIENT_SECRET: dummy
        run: |
          coverage run -m pytest tests/ -v
          coverage report --fail-under=40

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
